<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">English Learn</h1>
            <ul class="nav-links">
                <li><a href="#vocabulary">Vocabulary</a></li>
                <li><a href="#grammar">Grammar</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h2>Master English with Ease</h2>
            <p>Learn vocabulary and grammar through interactive lessons</p>
        </div>
    </header>

    <main class="container">
        <!-- Vocabulary Section -->
        <section id="vocabulary" class="section">
            <h2>📚 Vocabulary Lessons</h2>
            <div id="vocabulary-list" class="lessons-grid">
                <!-- Vocabulary lessons will be loaded here -->
            </div>
        </section>

        <!-- Grammar Section -->
        <section id="grammar" class="section">
            <h2>✏️ Grammar Lessons</h2>
            <div id="grammar-list" class="lessons-grid">
                <!-- Grammar lessons will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Modal for lesson details -->
    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 English Learning Website. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
